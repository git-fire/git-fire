name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - uses: golangci/golangci-lint-action@v7
        with:
          # golangci-lint v2.9+ declares go 1.25 in its module; pin to a v2
          # release that still supports the repo's go 1.24.x (go-version-file).
          version: v2.8.0
          args: --timeout=5m

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: UAT (scripts/uat_test.sh)
        env:
          GIT_FIRE_VERBOSE: "1"
        run: |
          bash scripts/ci_uat_preflight.sh
          make build
          bash scripts/uat_test.sh

  plugin-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Plugin contract tests
        run: >
          go test -race -count=1 ./cmd/... ./internal/plugins/...
          -run 'TestRunGitFire_OnFailurePluginErrorKeepsRunError|TestRunGitFire_OnSuccessPluginFailRunFailsRun|TestRunGitFire_DryRun_SkipsPostRunPlugins|TestParseTrigger|TestFilterPluginsByTrigger_AfterPushAliasesOnSuccess|TestLoadFromConfig_WiresFailRun|TestLoadFromConfig_FailRunDefaultFalse'
