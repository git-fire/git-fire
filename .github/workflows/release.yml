name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0-alpha)'
        required: true
        type: string
        default: 'v0.1.0-alpha'

permissions:
  contents: read

jobs:
  tag:
    name: Create tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require main branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Release workflow must be run from main; got ${GITHUB_REF}."
            exit 1
          fi

      - name: Validate version format
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if ! echo "$TAG" | grep -qE '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'; then
            echo "Invalid tag format: $TAG"
            echo "Expected: vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease"
            exit 1
          fi

          # Enforce SemVer rule: numeric prerelease identifiers must not have leading zeros.
          PRERELEASE="${TAG#v}"
          PRERELEASE="${PRERELEASE#*.*.*}"
          PRERELEASE="${PRERELEASE#-}"
          if [ -n "$PRERELEASE" ]; then
            IFS='.' read -r -a identifiers <<< "$PRERELEASE"
            for ident in "${identifiers[@]}"; do
              if [[ "$ident" =~ ^[0-9]+$ ]] && [[ "$ident" != "0" ]] && [[ "$ident" =~ ^0 ]]; then
                echo "Invalid prerelease identifier with leading zero: $ident"
                exit 1
              fi
            done
          fi

      - name: Ensure tag is reusable or create it
        id: tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          HEAD_SHA="$(git rev-parse HEAD)"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            TAG_SHA="$(git rev-list -n1 "$TAG")"
            if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
              echo "Tag exists locally on a different commit: $TAG ($TAG_SHA != $HEAD_SHA)"
              exit 1
            fi
            echo "Tag already exists locally on HEAD; reusing: $TAG"
          else
            REMOTE_SHA="$(git ls-remote --tags origin "refs/tags/$TAG" | awk '{print $1}' | head -n1)"
            if [ -n "$REMOTE_SHA" ]; then
              if [ "$REMOTE_SHA" != "$HEAD_SHA" ]; then
                echo "Tag exists on origin on a different commit: $TAG ($REMOTE_SHA != $HEAD_SHA)"
                exit 1
              fi
              echo "Tag already exists on origin on HEAD; reusing: $TAG"
            else
              git config user.name  "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git tag -a "${TAG}" -m "Release ${TAG}"
              git push origin "refs/tags/${TAG}"
            fi
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

  goreleaser:
    name: GoReleaser
    needs: tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
