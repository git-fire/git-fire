name: Publish to WinGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (example: v0.1.1-alpha)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-slim
    steps:
      - name: Publish release to WinGet (release event)
        if: github.event_name == 'release'
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: git-fire.git-fire
          installers-regex: '_windows_(386|amd64|arm64)\.zip$'
          fork-user: git-fire
          token: ${{ secrets.WINGET_TOKEN }}

      - name: Publish release to WinGet (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: git-fire.git-fire
          installers-regex: '_windows_(386|amd64|arm64)\.zip$'
          release-tag: ${{ inputs.release_tag }}
          fork-user: git-fire
          token: ${{ secrets.WINGET_TOKEN }}
