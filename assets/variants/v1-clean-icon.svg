<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160">
  <title>git-fire icon — V1 Cleaned-up teardrop</title>
  <desc>
    Variant 1: refined original teardrop flame. Fixes from the original:
    ghost node is now a solid wax-base double-circle; stem is longer and
    dashed so it reads as a wick/commit edge; flame tip leans slightly
    right (real flames are asymmetric); inner highlight repositioned to
    the hot-core left of centre; glow ellipse pulled inside viewBox.
    Candle metaphor: wax base (node) → wick (edge) → flame.
  </desc>
  <defs>
    <linearGradient id="v1-fg" x1="0.3" y1="1" x2="0.55" y2="0">
      <stop offset="0%"   stop-color="#B82E00"/>
      <stop offset="40%"  stop-color="#E5650A"/>
      <stop offset="75%"  stop-color="#F09520"/>
      <stop offset="100%" stop-color="#F8D040"/>
    </linearGradient>
    <linearGradient id="v1-fgi" x1="0.35" y1="1" x2="0.5" y2="0">
      <stop offset="0%"   stop-color="#F07818"/>
      <stop offset="100%" stop-color="#FEEEA0"/>
    </linearGradient>
    <radialGradient id="v1-glow" cx="50%" cy="85%" r="55%">
      <stop offset="0%"   stop-color="#F09020" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F09020" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="60" cy="148" rx="26" ry="7" fill="url(#v1-glow)"/>

  <circle cx="60" cy="138" r="10" fill="#2A2A2A" opacity="0.35"/>
  <circle cx="60" cy="138" r="6"  fill="#3A3A3A" opacity="0.25"/>

  <line x1="60" y1="128" x2="60" y2="106"
        stroke="#2A2A2A" stroke-width="2.5" opacity="0.50"
        stroke-linecap="round" stroke-dasharray="3,2.5"/>

  <path d="
    M60,106
    C42,97 31,80 33,58
    C35,38 46,22 60,16
    C74,24 84,40 85,60
    C87,82 77,97 60,106
    Z"
    fill="url(#v1-fg)" opacity="0.98"/>

  <path d="
    M59,97
    C50,89 44,74 46,57
    C48,43 54,31 59,25
    C64,31 70,44 71,58
    C73,75 67,89 59,97
    Z"
    fill="url(#v1-fgi)" opacity="0.42"/>
</svg>
