<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160">
  <title>git-fire icon — V3 Git Commit Tree</title>
  <desc>
    Variant 3: git DAG as candle body. Structure top-to-bottom:
    flame (y=0–68) ? HEAD commit bullseye node (y=74) ? trunk line
    (y=74–144) ? left branch diverges at y=96, node at (30,122),
    merges back at y=138 ? right branch diverges at y=106, node at
    (90,128), merges back at y=142 ? root commit (y=144).
    The commit graph IS the candle — history as wax, HEAD on fire.
  </desc>
  <defs>
    <linearGradient id="v3-flame" x1="0.25" y1="1" x2="0.6" y2="0">
      <stop offset="0%"   stop-color="#C03200"/>
      <stop offset="38%"  stop-color="#E8600A"/>
      <stop offset="72%"  stop-color="#F59820"/>
      <stop offset="100%" stop-color="#FAD84A"/>
    </linearGradient>
    <linearGradient id="v3-flamehi" x1="0.35" y1="1" x2="0.5" y2="0">
      <stop offset="0%"   stop-color="#F07818"/>
      <stop offset="100%" stop-color="#FEEEA0"/>
    </linearGradient>
    <radialGradient id="v3-glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%"   stop-color="#F09020" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#F09020" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="60" cy="74" rx="22" ry="16" fill="url(#v3-glow)"/>

  <line x1="60" y1="80" x2="60" y2="144"
        stroke="#2A2A2A" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>

  <path d="M60,96 Q46,104 30,122"
        stroke="#2A2A2A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M30,122 Q38,132 60,138"
        stroke="#2A2A2A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>

  <path d="M60,106 Q75,112 90,128"
        stroke="#2A2A2A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M90,128 Q80,138 60,142"
        stroke="#2A2A2A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>

  <circle cx="30"  cy="122" r="4.5" fill="#2A2A2A" opacity="0.65"/>
  <circle cx="90"  cy="128" r="4.5" fill="#2A2A2A" opacity="0.65"/>
  <circle cx="60"  cy="112" r="4"   fill="#2A2A2A" opacity="0.50"/>
  <circle cx="60"  cy="144" r="5.5" fill="#2A2A2A" opacity="0.80"/>

  <circle cx="60" cy="74" r="7" fill="#2A2A2A"/>
  <circle cx="60" cy="74" r="5" fill="#E5650A"/>
  <circle cx="60" cy="74" r="2.5" fill="#F8D040"/>

  <path d="
    M60,68
    C47,60 37,46 39,28
    C41,13 51,4 60,0
    C69,5 79,16 80,30
    C82,49 72,61 60,68
    Z"
    fill="url(#v3-flame)" opacity="0.97"/>

  <path d="
    M60,61
    C52,54 46,42 48,28
    C50,17 55,8 60,4
    C65,9 70,19 71,30
    C72,44 67,55 60,61
    Z"
    fill="url(#v3-flamehi)" opacity="0.42"/>
</svg>
